

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>einsteininseoul x kyuii</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 타이틀 -->
<div class="kyuii">
  <div class="circle">ein</div>
  <div class="circle">stein</div>
  <div class="circle">in</div>
  <div class="circle">seoul</div>

  <a href="http://kyuii.com/" target="_blank" class="circle">
    x kyuii
  </a>
</div>

<!-- 메뉴 -->
<div class="menu">
  <a onclick="showPage('info')" class="circle">ADDRESS</a>
  <a href="#" onclick="showPage('links')" class="circle">LINK</a>
</div>

<!-- 콘텐츠 -->
<div class="content">

  <div id="work" class="page active">
    <img src="images/01.jpg">
    <img src="images/02.jpg">
  </div>

  <div id="links" class="page">
    <p><a href="https://www.einsteininseoul.kr/" target="_blank">einsteininseoul</a></p>
    <p><a href="https://smartstore.naver.com/dol82must/products/13147462867" target="_blank">dolbag001</a></p>
  </div>

 <div id="info" class="page">

  <!-- 🔒 비밀번호 입력 -->
  <div id="pwBox">
    <input type="password" id="pw" placeholder="enter password" onkeydown="checkPw(event)">
  </div>

  <!-- 📍 주소 영역 (처음엔 숨김) -->
  <div id="addressBox" style="display:none;">
    <p id="typing"></p>
  </div>

</div>

<!-- footer -->
<div class="footer">
  einsteininseoul © 2026
</div>

<script>
function checkPw(e) {
  if (e.key === "Enter") {
    const input = document.getElementById("pw").value;

    if (input === "kyuii2026") {

      // 🔥 비번창 숨기고 주소 보여줌
      document.getElementById("pwBox").style.display = "none";
      document.getElementById("addressBox").style.display = "block";

      startTyping();

    } else {
      alert("wrong password");
    }
  }
}

function startTyping() {
  const text = `universe, earth, korea
서울시 종로구 자하문로33가길 29-9, 
1F
29-9, Jahamun-ro 33ga-gil, Jongno-gu, Seoul-city`;

  const el = document.getElementById("typing");
  el.innerHTML = "";

  let i = 0;

  function type() {
    if (i < text.length) {
      if (text.charAt(i) === "\n") {
        el.innerHTML += "<br>";
      } else {
        el.innerHTML += text.charAt(i);
      }
      i++;
      setTimeout(type, 100);
    } else {
      // 🔥 타이핑 끝나면 링크 추가
      el.innerHTML += `
        <br><br>
        <a href="https://naver.me/Ge7FchKd"
           target="_blank"
           class="address-link">
           VIEW MAP
        </a>
      `;
    }
  }

  type();
}
</script>

</body>
</html>
